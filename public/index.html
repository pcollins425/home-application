<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home — Transactions</title>
  <link rel="stylesheet" href="styles.css?v=5" />
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <div>
        <p class="eyebrow">Plaid account</p>
        <h1>Transactions</h1>
        <p class="sub" id="statusLine">Starting…</p>
      </div>
      <div class="actions">
        <button type="button" id="linkBtn" class="btn primary">Log in to bank</button>
        <button type="button" id="syncBtn" class="btn">Sync now</button>
        <a id="logoutLink" class="btn" href="auth/logout">Sign out</a>
      </div>
    </header>

    <section id="app">
      <div class="meta" id="meta"></div>
      <div class="table-wrap card">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Amount</th>
              <th>Description</th>
              <th>Location</th>
              <th>Account</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="5" class="empty">Starting…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="app.js?v=5"></script>
</body>
</html>

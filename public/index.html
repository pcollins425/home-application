<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home — Transactions</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <div>
        <p class="eyebrow">Home application</p>
        <h1>Transactions</h1>
        <p class="sub" id="statusLine">Checking status…</p>
      </div>
      <div class="actions">
        <button type="button" id="linkBtn" class="btn primary" disabled>Link account</button>
        <button type="button" id="syncBtn" class="btn" disabled>Sync now</button>
      </div>
    </header>

    <section id="gate" class="card gate">
      <h2>Access key</h2>
      <p>Enter the <code>ACCESS_KEY</code> Worker secret to load the dashboard.</p>
      <form id="gateForm" class="gate-form">
        <input id="accessKey" type="password" autocomplete="current-password" placeholder="ACCESS_KEY" required />
        <button type="submit" class="btn primary">Unlock</button>
      </form>
    </section>

    <section id="app" class="hidden">
      <div class="meta" id="meta"></div>
      <div class="table-wrap card">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Amount</th>
              <th>Description</th>
              <th>Location</th>
              <th>Account</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="5" class="empty">No transactions yet.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
